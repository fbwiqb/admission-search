        .card-title {

            font-weight: 600;

        .badge-warning {

        .badge-success {

        .badge-info {

        .badge-type {

        .btn-primary {

        .btn-secondary {

        .btn-close {

        .comparison-table {

        .comparison-table th {

            color: #475569;

        .comparison-table td {

        .loading {

        .empty-state {

            .tab {

            .search-section {

            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .comparison-bar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .modal-content {
                padding: 1rem;
            }

            .comparison-table {
                font-size: 0.875rem;
            }

            .comparison-table th,
            .comparison-table td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">

    <script>
        let allData = {};

        let searchQuery = '';
        let filters = { мөңм Җ: 'м „мІҙ', к¶Ңм—ӯ: 'м „мІҙ', мң нҳ•: 'м „мІҙ', л©ҙм ‘: 'м „мІҙ', м „нҳ•кө¬л¶„: 'м „мІҙ' };
        let comparisonItems = [];

        const tabConfig = {
            'м „мІҙкІҖмғү': ['мҲҳмӢң_көҗкіј', 'мҲҳмӢң_мў…н•©', 'л…јмҲ ', 'м •мӢң', 'мқҳм•Ҫн•ҷ', 'көҗлҢҖ', 'кі лҘёкё°нҡҢ', 'кІҪкё°к¶Ң_көӯкіөлҰҪ'],
            'мҲҳмӢң': ['мҲҳмӢң_көҗкіј', 'мҲҳмӢң_мў…н•©'],

            'кІҪкё°': 'рҹҸ«',
            'м§Җл°©': 'рҹҢ„',
            'көӯлҰҪ': 'рҹҸӣпёҸ',
            'мӮ¬лҰҪ': 'рҹҺ“',
            'мқҳлҢҖ': 'вҡ•пёҸ',

        async function init() {
            try {
                const response = await fetch('data.json');

                    </div>
                `;
            }
        }

        function renderTabs() {
            const tabs = document.getElementById('tabs');
            tabs.innerHTML = Object.keys(tabConfig).map(tab =>
                `<button class="tab ${tab === currentTab ? 'active' : ''}" onclick="changeTab('${tab}')">${tab}</button>`
            ).join('');
        }

        function changeTab(tab) {
            currentTab = tab;
            filters = { мөңм Җ: 'м „мІҙ', к¶Ңм—ӯ: 'м „мІҙ', мң нҳ•: 'м „мІҙ', л©ҙм ‘: 'м „мІҙ', м „нҳ•кө¬л¶„: 'м „мІҙ' };
            renderTabs();
            renderFilters();
            renderContent();
        }

        function renderFilters() {
            const filtersDiv = document.getElementById('filters');
            let html = '';

            if (currentTab === 'кі лҘёкё°нҡҢ') {
                const types = getUniqueValues('м „нҳ•мң нҳ•');

                `;
            } else if (currentTab !== 'ліҖкІҪмӮ¬н•ӯ') {
                html += `
                    <div class="filter-group">
                        <span class="filter-label">мөңм Җ:</span>

                        <button class="filter-chip ${filters.мөңм Җ === 'мөңм ҖO' ? 'active' : ''}" onclick="setFilter('мөңм Җ', 'мөңм ҖO')">мөңм Җ O</button>

                html += `
                    <div class="filter-group">
                        <span class="filter-label">л©ҙм ‘:</span>

                        <button class="filter-chip ${filters.л©ҙм ‘ === 'л©ҙм ‘O' ? 'active' : ''}" onclick="setFilter('л©ҙм ‘', 'л©ҙм ‘O')">л©ҙм ‘ O</button>

                if (currentTab === 'м „мІҙкІҖмғү') {
                    html += `

        function formatFieldValue(val) {

        const FORMAT_FIELDS = new Set(['мөңм ҖлӮҙмҡ©', 'нғҗкө¬м ңн•ң', 'мҲҳн•ҷм ңн•ң', 'мҳҒм–ҙкё°мӨҖ', '2м°Ём „нҳ•']);

        function getCardFields(item) {

        const opportunityEmoji = {

            'мӮ¬нҡҢл°°л Ө': 'рҹ’ӣ', 'лӢӨмһҗл…Җ': 'рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ', 'н•ңл¶ҖлӘЁ': 'рҹ‘ЁвҖҚрҹ‘§', 'нҠ№м„ұнҷ”кі ': 'рҹҸӯ',
            'мһҘм• мқё': 'вҷҝ', 'м„ңн•ҙ5лҸ„': 'рҹҸқпёҸ', 'кё°нҡҢк· нҳ•': 'вҡ–пёҸ', 'мӮ¬нҡҢнҶөн•©': 'рҹҢҲ',
            'нҠ№мҲҳкөҗмңЎ/л¶Ғн•ңмқҙнғҲ': 'рҹ•ҠпёҸ'

        function getEmoji(item) {

        function copyToClipboard(index) {

            statsDiv.style.display = 'grid';
        }

        function renderFooter() {
            const footer = document.getElementById('footer');

            if (!allData['лҚ°мқҙн„°м¶ңмІҳ']) {
                return;
            }

            const sources = allData['лҚ°мқҙн„°м¶ңмІҳ'].map(s => `
                <div class="source-item">
                    <span>${s.м¶ңмІҳ} (мӢ лў°лҸ„: ${s.мӢ лў°лҸ„ || '-'})</span>
                    ${s.URL ? `<a href="${s.URL}" target="_blank" rel="noopener noreferrer" class="source-link">л°”лЎңк°Җкё° вҶ’</a>` : ''}
                </div>
            `).join('');

            footer.innerHTML = `
                <div class="footer-title">лҚ°мқҙн„° м¶ңмІҳ</div>
                <div class="source-list">${sources}</div>
            `;
            footer.style.display = 'block';
        }

        window.addEventListener('scroll', () => {
            const scrollTop = document.getElementById('scrollTop');
            if (window.scrollY > 500) {
                scrollTop.classList.add('show');
            } else {
                scrollTop.classList.remove('show');
            }
        });

        document.getElementById('comparisonModal').addEventListener('click', (e) => {
            if (e.target.id === 'comparisonModal') {
                closeComparison();
            }
        });

        init();
    </script>
</body>
</html>
